<div [hidden]="activeTab !== 'dashboard'" class="dashboard-row">

  <!-- ═══════════════════════════════════════════════
       FILTER BAR — Device · Day/Week/Month · Hours
  ══════════════════════════════════════════════════ -->
  <div class="filter-container">

    <!-- Select Device -->
    <div class="filter-group">
      <label class="filter-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
        Select Device
      </label>
      <div class="select-wrapper">
        <select [(ngModel)]="selectedMac" (change)="loadData()" [disabled]="devicesLoading">
          <option *ngIf="devicesLoading" value="">Loading...</option>
          <option *ngIf="!devicesLoading && devices.length === 0" value="">No devices found</option>
          <option *ngFor="let device of devices" [value]="device.uniqueId">
            {{ device.uniqueId }}
          </option>
        </select>
        <span class="select-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- Select Day / Week / Month -->
    <div class="filter-group">
      <label class="filter-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Select Day
      </label>
      <div class="select-wrapper">
   <select [(ngModel)]="selectedCategory" (change)="onCategoryChange(true)">
          <option value="day">Day</option>
          <option value="week">Week</option>
          <option value="month">Month</option>
        </select>
        <span class="select-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- Select Hours -->
    <div class="filter-group">
      <label class="filter-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Select Hours
      </label>
      <div class="select-wrapper">
        <select [(ngModel)]="selectedOption" (change)="loadData()">
          <option *ngFor="let opt of subOptions" [value]="opt.value">
            {{ opt.label }}
          </option>
        </select>
        <span class="select-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </span>
      </div>
    </div>

  </div>
  <!-- END FILTER BAR -->


  <!-- Chart Type Buttons -->
<div class="model-wrapper">
  <p class="section-label">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
      <polyline points="2,18 8,10 13,14 22,4"/>
    </svg>
    Select Graph Type
  </p>
  <div class="model-container">
    <button
      *ngFor="let model of models"
      [class.active]="selectedModel.name === model.name"
      (click)="selectModel(model)"
      [title]="model.name">
      <span [innerHTML]="model.icon" class="chart-icon"></span>
    </button>
  </div>
</div>

  <!-- Dashboard Link -->
  <div class="add-widget-container">
    <span class="add-widget-text" routerLink="/dashboard">
      <span class="plus-symbol">+</span>
      Dashboard
    </span>
  </div>


  <!-- Chart -->
  <div class="chart-container">
    <canvas id="temperatureChart"></canvas>
  </div>

</div>
